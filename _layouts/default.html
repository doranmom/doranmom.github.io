<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ '/assets/css/blog.css' | relative_url }}" />
</head>
<body>
  <nav>
    <div class="wrap">
      <a class="brand" href="{{ '/' | relative_url }}">Seung-Bo Lee</a>
      <div class="links">
        <a href="{{ '/' | relative_url }}#about">소개</a>
        <a href="{{ '/' | relative_url }}#publications">논문</a>
        <a href="{{ '/reviews.html' | relative_url }}">리뷰</a>
        <a href="{{ '/' | relative_url }}#contact">연락처</a>
      </div>
    </div>
  </nav>

  <main class="wrap">
    {{ content }}
  </main>

  <footer>
    © {{ 'now' | date: "%Y" }} Seung-Bo Lee · 의료 인공지능 / 생체신호 연구<br>
    Hosted on GitHub Pages
  </footer>
</body>
</html>
