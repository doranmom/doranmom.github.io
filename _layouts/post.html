---
layout: default
---
<article class="post">
  <a class="back" href="{{ '/reviews.html' | relative_url }}">← 논문 리뷰 목록</a>
  <header class="post-head">
    <div class="date">{{ page.date | date: "%Y년 %m월 %d일" }}</div>
    <h1>{{ page.title }}</h1>
    {% if page.tags and page.tags.size > 0 %}
    <div class="tags">
      {% for tag in page.tags %}<span class="tag">{{ tag }}</span>{% endfor %}
    </div>
    {% endif %}
  </header>
  <div class="content">
    {{ content }}
  </div>
</article>
